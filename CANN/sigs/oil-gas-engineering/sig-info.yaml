name: oil-gas-engineering                          #SIG组名称
description: Oil Gas Engineering SIG（油气行业工程兴趣小组）是专注油气领域、打造昇腾原生算子库的专业技术小组。小组立足油气全业务范畴，依托 CANN 硬件底层算子能力，围绕油气勘探、生产、炼化三大核心业务场景开展算子研发,持续搭建并完善油气行业高性能计算算子库
mailing_list: oil-gas-engineering@cann.osinfra.cn  #SIG组讨论邮件列表地址
meeting_whiteboard_url: https://etherpad-cann.meeting.osinfra.cn/p/sig-oil-gas-engineering  #SIG例会纪要URL
