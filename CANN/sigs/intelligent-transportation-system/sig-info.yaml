name: intelligent-transportation-system
description: Intelligent Transportation System SIG 是面向智能交通系统领域的垂直兴趣小组，聚焦交通大数据分析、交通网络优化计算和交通大模型智能决策等场景，推进智能交通系统领域算子库、工具链和示例应用在CANN生态中的建设与落地。
